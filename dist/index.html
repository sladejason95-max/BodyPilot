      html.dark {

        --boot-panel: rgba(15, 23, 42, 0.88);
        --boot-border: rgba(255, 255, 255, 0.12);
        --boot-text: #e2e8f0;
        --boot-subtle: #94a3b8;
        --boot-track: rgba(255, 255, 255, 0.12);
        --boot-fill: #f8fafc;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--boot-bg);
        color: var(--boot-text);
        font-family: "Sora", "Avenir Next", "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      #root {
        min-height: 100vh;
      }

      #boot-shell {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--boot-bg);
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      body[data-app-ready="true"] #boot-shell {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-card {
        width: min(360px, calc(100vw - 48px));
        border-radius: 28px;
        border: 1px solid var(--boot-border);
        background: var(--boot-panel);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        padding: 28px;
        text-align: center;
        backdrop-filter: blur(18px);
      }

      .boot-logo {
        display: grid;
        place-items: center;
        height: 76px;
        width: 76px;
        margin: 0 auto;
        border-radius: 24px;
        box-shadow: 0 18px 32px rgba(15, 23, 42, 0.18);
      }

      .boot-logo img {
        display: block;
        height: 76px;
        width: 76px;
        border-radius: 24px;
      }

      .boot-title {
        margin: 18px 0 0;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
        color: var(--boot-text);
      }

      .boot-copy {
        margin: 8px 0 0;
        font-size: 14px;
        line-height: 1.5;
        color: var(--boot-subtle);
      }

      .boot-bar {
        height: 4px;
        border-radius: 999px;
        background: var(--boot-track);
        overflow: hidden;
        margin-top: 24px;
      }

      .boot-bar > span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--boot-fill);
        animation: boot-load 1.2s ease-in-out infinite;
        transform-origin: left center;
      }

      @keyframes boot-load {
        0% {
          transform: translateX(-100%) scaleX(0.45);
        }
        55% {
          transform: translateX(20%) scaleX(0.7);
        }
        100% {
          transform: translateX(120%) scaleX(0.45);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-bar > span {
          animation: none;
          transform: none;
          width: 72%;
        }
      }
    </style>
